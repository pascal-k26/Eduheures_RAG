projet:
  nom: "Eduheures — Assistant Universitaire UVCI"
  langue: "fr"
  universite: "Université Virtuelle de Côte d'Ivoire"
  version: "1.0.0"

ingestion:
  taille_chunk: 1000
  chevauchement_chunk: 150
  formats_acceptes:
    - ".txt"
    - ".pdf"

retrieval:
  nombre_documents: 5
  seuil_similarite: 0.3

generation:
  temperature: 0.5

historique:
  max_echanges: 10

chemins:
  donnees_brutes: "data/raw"
  base_vecteurs: "vector_db"
  prompt: "prompts/rag_prompt.txt"

# Sites officiels UVCI pour la recherche web agentique
web_search:
  sites_prioritaires:
    - "uvci.edu.ci"
    - "elearning.uvci.edu.ci"
    - "mesrs.ci"
  termes_contexte: "UVCI université virtuelle Côte d'Ivoire"
